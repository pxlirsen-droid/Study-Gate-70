    <script>

        // ปุ่ม 1: ค้นหาข้อมูลอัจฉริยะ (ล็อกเดิม)
        function fetchTcasData() {
            var keyword = document.getElementById('search-keyword').value;
            var res = document.getElementById('res-search');
            if(!keyword) { alert('กรุณากรอกชื่อคณะก่อนนะอ้วน'); return; }
            res.innerHTML = "⏳ <i>ระบบกำลังดึงข้อมูลเรียลไทม์จำลองสถิติจาก ทปอ. (mytcas.com)...</i>";
            setTimeout(function() {
                res.innerHTML = "<b>📡 ผลการสืบค้นข้อมูลจำลองสถิติสำหรับ '" + keyword + "':</b><br>" +
                    "• <b>จำนวนรับรวมทุกรอบ:</b> 145 ที่นั่ง (รอบ 1: 45 | รอบ 2: 40 | รอบ 3: 60)<br>" +
                    "• <b>คะแนนสูงสุดย้อนหลัง:</b> 81.20 คะแนน | <b>คะแนนต่ำสุดย้อนหลัง:</b> 63.50 คะแนน<br>" +
                    "• <b>เกณฑ์วิชาคัดเลือก:</b> TGAT (30%) + TPAT (30%) + A-Level (40%)<br>" +
                    "<span class=\"badge\">อัปเดตระบบสารสนเทศเสร็จสิ้น</span>";
            }, 400);
        }

        // ปุ่ม 2: ระบบคำนวณเกรด 7 วิชา (ล็อกเดิม)
        function calculateComplexGpax() {
            var terms = document.getElementById('g-terms').value;
            var subjects = [
                { name: "คณิตศาสตร์", score: parseFloat(document.getElementById('g-math').value) || 0 },
                { name: "ภาษาอังกฤษ", score: parseFloat(document.getElementById('g-eng').value) || 0 },
                { name: "เคมี", score: parseFloat(document.getElementById('g-chem').value) || 0 },
                { name: "ชีววิทยา", score: parseFloat(document.getElementById('g-bio').value) || 0 },
                { name: "ฟิสิกส์", score: parseFloat(document.getElementById('g-physics').value) || 0 },
                { name: "ภาษาไทย", score: parseFloat(document.getElementById('g-thai').value) || 0 },
                { name: "สังคมศึกษา", score: parseFloat(document.getElementById('g-social').value) || 0 }
            ];

            for(var i=0; i<subjects.length; i++) {
                if(subjects[i].score < 0 || subjects[i].score > 4) { alert('กรุณากรอกเกรดให้อยู่ในช่วง 0.00 - 4.00 นะอ้วน'); return; }
            }

            var totalScore = 0;
            var maxSubject = subjects[0];
            for(var j=0; j<subjects.length; j++) {
                totalScore += subjects[j].score;
                if(subjects[j].score > maxSubject.score) { maxSubject = subjects[j]; }
            }
            var gpax = totalScore / subjects.length;

            var analysis = "";
            if(maxSubject.name === "คณิตศาสตร์") { analysis = "คุณมีทักษะการคำนวณและตรรกศาสตร์ที่โดดเด่นมาก คณะที่เหมาะสมที่สุดคือ <b>คณะพาณิชยศาสตร์และบัญชี, คณะวิทยาศาสตร์ (สาขาคณิตศาสตร์/สถิติ), คณะเศรษฐศาสตร์ หรือ คณะเทคโนโลยีสารสนเทศ (IT)</b> เนื่องจากเป็นสายงานที่ต้องใช้การวิเคราะห์ตัวเลขและโครงสร้างข้อมูลเชิงปริมาณเป็นหลัก"; }
            else if(maxSubject.name === "ภาษาอังกฤษ") { analysis = "คุณมีต้นทุนทักษะการสื่อสารสากลที่ยอดเยี่ยม คณะที่เหมาะสมที่สุดคือ <b>คณะอักษรศาสตร์, คณะมนุษยศาสตร์, คณะศิลปศาสตร์, คณะนิเทศศาสตร์ (หลักสูตรนานาชาติ) หรือ คณะรัฐศาสตร์ (สาขาความสัมพันธ์ระหว่างประเทศ)</b> เพื่อนำทักษะทางภาษาไปต่อยอดในการวิเคราะห์ข้อมูล วรรณกรรม หรือการทูตระดับสากล"; }
            else if(maxSubject.name === "เคมี") { analysis = "คุณมีความเข้าใจในโครงสร้างสสารและการประยุกต์ใช้องค์ประกอบธาตุ คณะที่เหมาะสมที่สุดคือ <b>คณะเภสัชศาสตร์, คณะวิศวกรรมศาสตร์ (สาขาวิศวกรรมเคมี), คณะวิทยาศาสตร์ (สาขาเคมี) หรือ คณะอุตสาหกรรมเกษตร</b> เพราะกลุ่มนี้จำเป็นต้องใช้ความรู้แล็บและการควบคุมปฏิกิริยาเคมีเชิงลึก"; }
            else if(maxSubject.name === "ชีววิทยา") { analysis = "คุณมีความจำเป็นเลิศและเข้าใจในกลไกของสิ่งมีชีวิต คณะที่เหมาะสมที่สุดคือ <b>คณะแพทยศาสตร์, คณะทันตแพทยศาสตร์, คณะสัตวแพทยศาสตร์, คณะสหเวชศาสตร์ หรือ คณะวิทยาศาสตร์การกีฬา</b> เนื่องจากคณะเหล่านี้เน้นการศึกษาโครงสร้าง สรีรวิทยา และระบบชีวภาพอย่างละเอียด"; }
            else if(maxSubject.name === "ฟิสิกส์") { analysis = "คุณเข้าใจในกฎธรรมชาติ กลศาสตร์ และการคำนวณเชิงกายภาพ คณะที่เหมาะสมที่สุดคือ <b>คณะวิศวกรรมศาสตร์ (สาขาโยธา/ไฟฟ้า/เครื่องกล), คณะสถาปัตยกรรมศาสตร์ หรือ คณะวิทยาศาสตร์ (สาขาฟิสิกส์)</b> เพราะต้องใช้การคิดคำนวณความแข็งแรง โครงสร้าง และพลังงานในการออกแบบนวัตกรรม"; }
            else if(maxSubject.name === "ภาษาไทย") { analysis = "คุณมีทักษะการใช้ภาษา การจับใจความ และวาทศิลป์ที่ชัดเจน คณะที่เหมาะสมที่สุดคือ <b>คณะนิติศาสตร์ (เน้นการตีความกฎหมาย), คณะนิเทศศาสตร์ (สาขาวารสารศาสตร์/การสื่อสาร), คณะครุศาสตร์ หรือ คณะโบราณคดี</b> ซึ่งเป็นสายอาชีพที่ต้องขับเคลื่อนด้วยการสื่อสารและการใช้ภาษาที่ทรงพลัง"; }
            else if(maxSubject.name === "สังคมศึกษา") { analysis = "คุณมีความเข้าใจในโครงสร้างสังคม ประวัติศาสตร์ และพฤติกรรมมนุษย์ คณะที่เหมาะสมที่สุดคือ <b>คณะรัฐศาสตร์ (สาขาการปกครอง/บริหารรัฐกิจ), คณะสังคมวิทยาและมานุษยวิทยา, คณะนิติศาสตร์ หรือ คณะสังคมศาสตร์</b> เหมาะกับการทำงานที่เกี่ยวข้องกับการบริหารจัดการคน ชุมชน และข้อกฎหมาย"; }

            var res = document.getElementById('res-gpax');
            res.innerHTML = "<b>📊 ผลการประมวลคำนวณเกรดสะสมรวม (" + terms + "):</b><br>" +
                "• เกรดเฉลี่ยสะสม 7 วิชาหลัก: <b style='font-size:18px; color:#4f46e5;'>" + gpax.toFixed(2) + "</b><br>" +
                "• วิชาที่ทำคะแนนได้สูงสุด: <b style='color:#166534;'>" + maxSubject.name + " (" + maxSubject.score.toFixed(2) + ")</b><br><br>" +
                "<b>💡 บทวิเคราะห์แนะนำคณะเข้าศึกษาต่อยุทธศาสตร์:</b><br>" + analysis;
        }

        // ปุ่ม 3: ระบบดึงเกณฑ์คะแนนรวมทุกคณะ อิงเกณฑ์ปี 69 (ล็อกเดิม)
        function searchTcas69Criteria() {
            var input = document.getElementById('search-criteria-input').value;
            var res = document.getElementById('res-criteria');
            if(!input) { alert('กรุณาพิมพ์ระบุคณะหรือสาขาที่ต้องการก่อนนะอ้วน'); return; }
            res.innerHTML = "⏳ <i>ระบบฐานข้อมูลอัจฉริยะกำลังเก็บเกณฑ์และค่าน้ำหนักคะแนนของปี TCAS69...</i>";
            setTimeout(function() {
                res.innerHTML = "<b>📋 ผลการสกัดเกณฑ์วิชาและค่าน้ำหนักคะแนนเฉลี่ย [อิงระบบ TCAS69] สำหรับ '" + input + "':</b><br>" +
                    "<table style='margin-top:10px;'>" +
                    "<tr><th>ประเภทเกณฑ์วิชา</th><th>สัดส่วนค่าน้ำหนักยื่นคะแนนที่กำหนด</th><th>เงื่อนไขเกรดขั้นต่ำ (GPAX)</th></tr>" +
                    "<tr><td><b>กลุ่มวิชาความถนัดทั่วไป (TGAT)</b></td><td>ค่าน้ำหนักร่วม 30% - 40% (เน้นการสื่อสารภาษาอังกฤษและเหตุผล)</td><td rowspan='3' style='vertical-align: middle; text-align: center;'><span class='badge'>ใช้ GPAX ขั้นต่ำ 2.00 หรือเทียบเท่า</span></td></tr>" +
                    "<tr><td><b>กลุ่มความถนัดวิชาชีพ (TPAT)</b></td><td>ค่าน้ำหนัก 20% - 30% (ประเมินตามบริบททักษะสายงานคณะที่เลือก)</td></tr>" +
                    "<tr><td><b>กลุ่มวิชาการสอบวิชาการ (A-Level)</b></td><td>ค่าน้ำหนัก 40% - 50% (ใช้คะแนนวิชาแกนหลักแยกตามสายวิทย์-ศิลป์)</td></tr>" +
                    "</table><br>" +
                    "⚠️ <i>หมายเหตุ: เกณฑ์นี้จำลองโครงสร้างสัดส่วนตามแนวทางประกาศเพื่อให้เด็กเตรียมสอบ TCAS69 วางแผนเก็บคะแนนล่วงหน้า</i>";
            }, 400);
        }

        // ปุ่ม 4: ฟังก์ชันคำนวณสถิติจัดอันดับและวาดกราฟความเบี่ยงเบน (ล็อกเดิม)
        function processRankings() {
            var r1_name = document.getElementById('r1-name').value;
            var r1_type = document.getElementById('r1-type').value;
            var r2_name = document.getElementById('r2-name').value;
            var r2_type = document.getElementById('r2-type').value;
            var r3_name = document.getElementById('r3-name').value;
            var r3_type = document.getElementById('r3-type').value;
            var r4_name = document.getElementById('r4-name').value;
            var r4_type = document.getElementById('r4-type').value;

            if(!r1_name || !r2_name || !r3_name || !r4_name) { alert('กรอกชื่อคณะเป้าหมายให้ครบทั้ง 4 อันดับก่อนนะอ้วน'); return; }

            var types = [r1_type, r2_type, r3_type, r4_type];
            var countSci = 0, countMed = 0, countArt = 0;
            for(var i=0; i<types.length; i++) {
                if(types[i] === "sci") countSci++;
                else if(types[i] === "med") countMed++;
                else if(types[i] === "art") countArt++;
            }

            var pctSci = (countSci / 4) * 100;
            var pctMed = (countMed / 4) * 100;
            var pctArt = (countArt / 4) * 100;

            var tableHtml = "<table>" +
                "<tr><th>อันดับยุทธศาสตร์</th><th>ชื่อคณะ / มหาวิทยาลัย</th><th>กลุ่มสายวิชา</th></tr>" +
                "<tr><td><b>อันดับ 1 (เป้าหมายสูงสุด)</b></td><td>" + r1_name + "</td><td>" + document.getElementById('r1-type').options[document.getElementById('r1-type').selectedIndex].text + "</td></tr>" +
                "<tr><td><b>อันดับ 2 (สำรองสายแข็ง)</b></td><td>" + r2_name + "</td><td>" + document.getElementById('r2-type').options[document.getElementById('r2-type').selectedIndex].text + "</td></tr>" +
                "<tr><td><b>อันดับ 3 (ปลอดภัยเซฟโซน)</b></td><td>" + r3_name + "</td><td>" + document.getElementById('r3-type').options[document.getElementById('r3-type').selectedIndex].text + "</td></tr>" +
                "<tr><td><b>อันดับ 4 (ฐานมั่นคงกันหลุด)</b></td><td>" + r4_name + "</td><td>" + document.getElementById('r4-type').options[document.getElementById('r4-type').selectedIndex].text + "</td></tr>" +
                "</table>";
            document.getElementById('ranking-table-output').innerHTML = tableHtml;

            document.getElementById('bar-sci').style.width = pctSci + "%";
            document.getElementById('val-sci').innerText = pctSci + "%";
            document.getElementById('bar-med').style.width = pctMed + "%";
            document.getElementById('val-med').innerText = pctMed + "%";
            document.getElementById('bar-art').style.width = pctArt + "%";
            document.getElementById('val-art').innerText = pctArt + "%";

            var finalConclusion = "";
            if(countSci >= 3) { finalConclusion = "🎯 <b>วิเคราะห์ความเบี่ยงเบน:</b> ตัวตนของคุณเทน้ำหนักไปทาง <b>[สายวิศวกรรมศาสตร์และเทคโนโลยี] อย่างชัดเจน</b> แผนการเตรียมตัวหลักควรเน้นทำคะแนนสอบวิชา TPAT3 ความถนัดวิทยาศาสตร์เทคโนโลยี และ A-Level ฟิสิกส์/คณิตศาสตร์1 เป็นหลักเพื่อสร้างความได้เปรียบสูงสุด"; }
            else if(countMed >= 3) { finalConclusion = "🩺 🎯 <b>วิเคราะห์ความเบี่ยงเบน:</b> ตัวตนของคุณมุ่งมั่นไปทาง <b>[สายแพทย์และสาธารณสุขชีวภาพ] สูงมาก</b> ยุทธศาสตร์สำคัญคือการพิชิตคะแนนสอบ TPAT1 ความถนัดแพทย์ และเก็บคะแนนเฉลี่ยกลุ่ม A-Level 7 วิชาหลักให้สม่ำเสมอ"; }
            else if(countArt >= 3) { finalConclusion = "🎨 🎯 <b>วิเคราะห์ความเบี่ยงเบน:</b> ตัวตนของคุณเทใจไปทาง <b>[สายศิลป์ภาษามนุษยศาสตร์และสังคมศาสตร์] มั่นคงมาก</b> วิชาชี้ชะตาที่จะทำให้อันดับ 1 ติดชัวร์คือการทำคะแนนสอบหนีกลุ่มประชากรในวิชา TGAT และ A-Level ภาษาอังกฤษ/ภาษาไทย/สังคมศาสตร์"; }
            else { finalConclusion = "⚖️ 🎯 <b>วิเคราะห์ความเบี่ยงเบน:</b> แผนการจัดอันดับของคุณเป็นแบบ <b>[ผสมผสานพหุปัญญา] (ไม่ได้เอียงไปฝั่งไหนเป็นพิเศษ)</b> สะท้อนว่าคุณกำลังเลือกระหว่างความชอบที่หลากหลาย แนะนำให้รีบตรวจสอบวิชาสอบที่ทับซ้อนกันเพื่อไม่ให้โหลดการอ่านหนังสือหนักเกินไปนะครับอ้วน"; }
            
            document.getElementById('chart-analysis-conclusion').innerHTML = finalConclusion;
            document.getElementById('ranking-result-container').style.display = 'block';
        }

        // ปุ่ม 5: ระบบค้นหาตัวเองด้วยระบบ AI-Text Analysis (ตัวใหม่พิมพ์สรุปเองตามสั่ง!)
        function analyzeSelfAI() {
            var input = document.getElementById('ai-self-input').value.trim();
            var res = document.getElementById('res-self');
            
            if(!input) { alert('พิมพ์บอกเล่าความชอบ ความถนัด หรือความฝันของอ้วนก่อนนะจ๊ะ'); return; }
            
            res.innerHTML = "⏳ <i>ระบบ AI จำลองกำลังอ่านข้อความวิเคราะห์คีย์เวิร์ดพฤติกรรมและความต้องการของคุณ...</i>";
            
            setTimeout(function() {
                var text = input.toLowerCase();
                var matchGroup = "";
                var reasoning = "";
                
                // ระบบสแกนหาคีย์เวิร์ดในข้อความที่พิมพ์จริงแบบไดนามิก
                if(text.includes('คอม') || text.includes('เกม') || text.includes('โค้ด') || text.includes('วิศวะ') || text.includes('เลข') || text.includes('คำนวณ') || text.includes('หุ่นยนต์')) {
                    matchGroup = "📐 กลุ่มคณะวิศวกรรมศาสตร์, วิทยาศาสตร์เทคโนโลยี และไอที (IT)";
                    reasoning = "เนื่องจากข้อความของคุณมีการเอ่ยถึงเทคโนโลยี โครงสร้างระบบ หรือการแก้ปัญหาเชิงตรรกะ ซึ่งเป็นหัวใจสำคัญของสายงานนวัตกรรม";
                } else if(text.includes('หมอ') || text.includes('แพทย์') || text.includes('ยา') || text.includes('โรงพยาบาล') || text.includes('ฟัน') || text.includes('สัตว์') || text.includes('ชีวะ') || text.includes('คนไข้')) {
                    matchGroup = "🩺 กลุ่มคณะแพทยศาสตร์, เภสัชศาสตร์, ทันตแพทย์ และวิทยาศาสตร์สุขภาพ";
                    reasoning = "เนื่องจากความสนใจของคุณมุ่งเน้นไปที่ระบบกลไกของสิ่งมีชีวิต การดูแลรักษาสุขภาพ และการช่วยเหลือเพื่อนมนุษย์ตามหลักการแพทย์";
                } else if(text.includes('วาด') || text.includes('ภาษา') || text.includes('อังกฤษ') || text.includes('เขียน') || text.includes('กฎหมาย') || text.includes('บริหาร') || text.includes('เงิน') || text.includes('บัญชี') || text.includes('การตลาด')) {
                    matchGroup = "🎨 กลุ่มคณะพาณิชยศาสตร์และบัญชี, นิติศาสตร์, อักษรศาสตร์ หรือนิเทศศาสตร์";
                    reasoning = "เนื่องจากคุณมีความโดดเด่นในด้านความคิดสร้างสรรค์ การจัดการธุรกิจ ข้อตกลงทางสังคม หรือการสื่อสารที่มีประสิทธิภาพ";
                } else {
                    matchGroup = "⚖️ กลุ่มคณะสหวิทยาการ หรือรัฐศาสตร์บริหารจัดการชุมชน";
                    reasoning = "จากข้อความที่คุณบอกเล่ามา สะท้อนความชอบที่หลากหลายและมีความยืดหยุ่นสูง สามารถปรับตัวเข้ากับวิชาโครงสร้างเชิงสังคมและการทำงานร่วมกับผู้อื่นได้ดีเยี่ยม";
                }
                
                res.innerHTML = "<b>🧩 ผลสรุปบทวิเคราะห์ AI จากข้อความที่คุณพิมพ์:</b><br>" +
                    "• <b>วิเคราะห์เป้าหมายหลัก:</b> <span style='color:#4f46e5; font-weight:bold;'>" + matchGroup + "</span><br>" +
                    "• <b>เหตุผลประกอบเชิงลึก:</b> " + reasoning + "<br><br>" +
                    "💡 <i>คำแนะนำถัดไป: ลองนำกลุ่มคณะที่ได้นี้ไปลองจับคู่วางแผนยื่นคะแนนในปุ่มที่ 4 (ระบบบันทึกจัดอันดับ) ได้เลยนะอ้วน!</i>";
            }, 500);
        }

        }
