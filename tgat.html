<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>คลังข้อสอบ T-GAT พร้อมเฉลย</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Prompt", sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    background:linear-gradient(135deg,#1565c0,#42a5f5);
    color:white;
    text-align:center;
    padding:35px 20px;
}

header h1{
    font-size:35px;
}

header p{
    margin-top:10px;
    font-size:18px;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

/* Search Box */

#searchBox{
    width:100%;
    padding:15px;
    border:2px solid #1976d2;
    border-radius:12px;
    font-size:18px;
    margin-bottom:25px;
}

/* Card */

.exam-card{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.exam-card:hover{
    transform:translateY(-5px);
}

.exam-card h2{
    color:#1565c0;
}

.exam-card p{
    color:#666;
    margin:10px 0;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#1976d2;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    transition:.3s;
}

.btn:hover{
    background:#0d47a1;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
<h1>📚 คลังข้อสอบ T-GAT พร้อมเฉลย</h1>
<p>ค้นหาและเปิดข้อสอบย้อนหลังได้ทันที</p>
</header>

<div class="container">

<input
type="text"
id="searchBox"
placeholder="🔍 ค้นหาข้อสอบ เช่น TGAT1, TGAT2, TGAT3..."
onkeyup="searchExam()">

<div class="exam-card">
<h2>T-GAT1 พร้อมเฉลย</h2>
<p>การสื่อสารภาษาอังกฤษ</p>

<a class="btn"
href="https://drive.google.com/file/d/1Rc56NswQ7pV7hPbZNOilpdgagFoVXuwH/view?usp=drivesdk"
target="_blank">
📄 เปิดข้อสอบ
</a>

</div>

<div class="exam-card">

<h2>T-GAT2 พร้อมเฉลย</h2>

<p>การคิดอย่างมีเหตุผล</p>

<a class="btn"
href="https://drive.google.com/file/d/16HSRGCag0YDaPGWk_fwH0bV9uKNtDLgq/view?usp=drivesdk"
target="_blank">
📄 เปิดข้อสอบ
</a>

</div>

<div class="exam-card">

<h2>T-GAT3 พร้อมเฉลย</h2>

<p>สมรรถนะการทำงาน</p>

<a class="btn"
href="https://drive.google.com/file/d/1oB_5yME_j3jnosH8UfFr3s1t9SIInPle/view?usp=drivesdk"
target="_blank">
📄 เปิดข้อสอบ
</a>

</div>

</div>

<footer>
© 2026 คลังข้อสอบ T-GAT พร้อมเฉลย
</footer>

<script>

function searchExam(){

let input=document.getElementById("searchBox").value.toLowerCase();

let cards=document.getElementsByClassName("exam-card");

for(let i=0;i<cards.length;i++){

let text=cards[i].innerText.toLowerCase();

if(text.indexOf(input)>-1){

cards[i].style.display="block";

}else{

cards[i].style.display="none";

}

}

}

</script>

</body>
</html>
