 <div id="p2" class="page">
            <h2>📊 2. ระบบคำนวณเกรดเฉลี่ยรายวิชาและวิเคราะห์แนวทางคณะยุทธศาสตร์</h2>
            <p style="color: #64748b;">เลือกจำนวนเทอมที่ต้องการคำนวณ และใส่เกรดเฉลี่ยของแต่ละวิชาเพื่อประมวลหาจุดเด่นและคณะที่เหมาะสม</p>
            
            <label><b>เลือกจำนวนเทอมที่ต้องการคำนวณคะแนน:</b></label>
            <select id="g-terms">
                <option value="1 เทอม">1 เทอม (เช่น ม.4 เทอม 1)</option>
                <option value="2 เทอม">2 เทอม (เกรดเฉลี่ยรวม 1 ปีการศึกษา)</option>
                <option value="4 เทอม">4 เทอม (เกรดเฉลี่ยรวม 2 ปีการศึกษา)</option>
                <option value="5 เทอม">5 เทอม (สำหรับยื่นสมัครรอบพอร์ต/โควตา)</option>
                <option value="6 เทอม">6 เทอม (เกรดเฉลี่ยสะสมจบหลักสูตร ม.ปลาย)</option>
            </select>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                <div><label><b>1. วิชาคณิตศาสตร์:</b></label><input type="number" id="g-math" step="0.01" min="0" max="4" value="3.80"></div>
                <div><label><b>2. วิชาภาษาอังกฤษ:</b></label><input type="number" id="g-eng" step="0.01" min="0" max="4" value="3.50"></div>
                <div><label><b>3. วิชาเคมี:</b></label><input type="number" id="g-chem" step="0.01" min="0" max="4" value="3.20"></div>
                <div><label><b>4. วิชาชีววิทยา:</b></label><input type="number" id="g-bio" step="0.01" min="0" max="4" value="3.00"></div>
                <div><label><b>5. วิชาฟิสิกส์:</b></label><input type="number" id="g-physics" step="0.01" min="0" max="4" value="3.10"></div>
                <div><label><b>6. วิชาภาษาไทย:</b></label><input type="number" id="g-thai" step="0.01" min="0" max="4" value="3.40"></div>
            </div>
            <div style="margin-top: 10px;"><label><b>7. วิชาสังคมศึกษา:</b></label><input type="number" id="g-social" step="0.01" min="0" max="4" value="3.30"></div>

            <button class="action-btn" style="margin-top: 15px;" onclick="calculateComplexGpax()">ประมวลผลคำนวณและวิเคราะห์คณะที่ควรเข้า</button>
            <div id="res-gpax" class="result-box">ตรวจสอบคะแนนเกรดเฉลี่ยด้านบน เลือกรอบเทอม แล้วกดปุ่มเพื่อดูสรุปผล...</div>
